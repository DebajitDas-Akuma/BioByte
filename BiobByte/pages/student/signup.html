<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Student Account • BioByte</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/signup.css">

</head>

<body>

<main class="signup">

<div class="signup__container">

<a
href="../../index.html"
class="signup__back">

← Back to Home

</a>


<div class="signup-card">

<div class="signup-card__header">

<div class="signup-card__logo">

🧬 Bio<span>Byte</span>

</div>

<h1>

Create Student Account

</h1>

<p>

Join a batch and track your Biology journey.

</p>

</div>



<form
id="signupForm"
class="signup-form">

<label>

Full Name

<input
type="text"
name="name"
id="fullName"
required>

</label>



<label>

Email

<input
type="email"
name="email"
id="email"
required>

</label>



<label>

Password

<div class="password">

<input
type="password"
name="password"
id="password"
required>

<button
type="button"
class="password-toggle"
data-target="password">

👁

</button>

</div>

</label>



<label>

Confirm Password

<div class="password">

<input
type="password"
id="confirmPassword"
required>

<button
type="button"
class="password-toggle"
data-target="confirmPassword">

👁

</button>

</div>

</label>



<label>

Whatsapp Number

<input
type="tel"
id="whatsapp"
name="whatsapp"
placeholder="+91"
required>

</label>

<p class="helper">

Used only by teachers for batch coordination.

</p>



<label>

Class

<select id="studentClass" name ="class" required>

<option value="">
Select Class
</option>

<option value="6">
Class VI
</option>

<option value="7">
Class VII
</option>

<option value="8">
Class VIII
</option>

<option value="9">
Class IX
</option>

<option value="10">
Class X
</option>

<option value="11">
Class XI
</option>

<option value="12">
Class XII
</option>

</select>

</label>


<!--
<label class="checkbox">

<input
type="checkbox"
id="terms"
required>

<span>

I agree to Terms

</span>

</label>
-->


<button
type="button"
id="googleSignupBtn"
class="btn btn--outline btn--full">

Continue with Google

</button>



<button
type="submit"
id="signupBtn"
class="btn btn--primary btn--full">

Create Account

</button>



<p class="switch">

Already have an account?

<a href="login.html">

Log In

</a>

</p>

</form>

</div>

</div>

</main>

<script>

document
.querySelectorAll(
".password-toggle"
)
.forEach(

button=>{

button.onclick=()=>{

const input=

document.getElementById(
button.dataset.target
);

input.type=

input.type==="password"

?

"text"

:

"password";

};

}

);

</script>
<script
type="module"
src="../../assets/js/student-signup.js">
</script>
</body>

</html>

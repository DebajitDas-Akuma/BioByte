<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Student Login • BioByte</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/style.css">

<link rel="stylesheet" href="../../assets/css/login.css">

</head>

<body>

<main class="login">

<div class="login__container">

<a
href="../../index.html"
class="login__back">

← Back to Home

</a>



<div class="login-card">

<div class="login-card__header">

<div class="login-card__logo">

🧬 Bio<span>Byte</span>

</div>

<h1>

Student Login

</h1>

<p>

Access your batches, exam results and study materials.

</p>

</div>



<form
id="loginForm"
class="login-form">

<label>

Email

<input
type="email"
id="email"
required>

</label>



<label>

Password

<div class="password">

<input
type="password"
id="password"
required>

<button
type="button"
class="password-toggle"
data-target="password">

👁

</button>

</div>

</label>



<label class="remember">

<input
type="checkbox"
id="rememberMe"
checked>

<span>

Keep me signed in

</span>

</label>



<button
type="button"
id="googleLoginBtn"
class="btn btn--outline btn--full">

Continue with Google

</button>



<button
type="submit"
id="loginBtn"
class="btn btn--primary btn--full">

Login

</button>



<div class="login-links">

<a href="#">

Forgot Password?</a>

</div>



<p class="switch">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</form>

</div>

</div>

</main>



<script>

document
.querySelector(
".password-toggle"
)
.onclick=()=>{

const input=

document.getElementById(
"password"
);

input.type=

input.type==="password"

?

"text"

:

"password";

};

</script>

</body>

</html>

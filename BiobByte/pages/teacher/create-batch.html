<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Batch • BioByte</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/style.css">

<link rel="stylesheet" href="../../assets/css/create-batch.css">

</head>

<body>

<main class="batch">

<div class="batch__container">

<a
href="dashboard.html"
class="batch__back">

← Dashboard

</a>



<div class="batch-card">

<h1>

Create New Batch

</h1>

<p>

Create a batch and configure access for students.

</p>



<form
id="createBatchForm">

<label>

Batch Name

<input
type="text"
id="batchName"
required>

</label>



<label>

Class

<select
id="batchClass"
required>

<option value="">
Select Class
</option>

<option>
Class VI
</option>

<option>
Class VII
</option>

<option>
Class VIII
</option>

<option>
Class IX
</option>

<option>
Class X
</option>

<option>
Class XI
</option>

<option>
Class XII
</option>

</select>

</label>



<label>

Batch Timing

<input
type="text"
id="batchTiming"
placeholder="Tuesday 5:30 PM, Thursday 5:30 PM"
required>

</label>



<label>

Google Drive Link

<input
type="url"
id="driveLink"
placeholder="https://"
required>

</label>



<label>

Batch Description

<textarea
id="batchDescription"
rows="5">

</textarea>

</label>



<label class="checkbox">

<input
type="checkbox"
id="batchVisible"
checked>

<span>

Students can apply immediately

</span>

</label>



<button
type="submit"
id="createBatchBtn"
class="btn btn--primary btn--full">

Create Batch

</button>

</form>

</div>

</div>

</main>

</body>

</html>

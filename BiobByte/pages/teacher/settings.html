<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Settings • BioByte
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="../../assets/css/style.css">

<link
rel="stylesheet"
href="../../assets/css/settings.css">

</head>

<body>

<main class="settings">

<div class="container">

<a
href="dashboard.html"
class="back">

← Dashboard

</a>



<section class="settings-card">

<h1>

Teacher Settings

</h1>

<p>

Manage your BioByte workspace.

</p>



<div class="section">

<h2>

Account

</h2>

<div class="grid">

<input
placeholder="Teacher Name">

<input
placeholder="Email">

</div>

</div>



<div class="section">

<h2>

Notifications

</h2>

<label class="toggle">

<input
type="checkbox"
checked>

<span>

Notify when students apply

</span>

</label>



<label class="toggle">

<input
type="checkbox"
checked>

<span>

Notify when results are published

</span>

</label>

</div>



<div class="section">

<h2>

Default Batch Settings

</h2>

<div class="grid">

<select>

<option>

Class VI–XII

</option>

</select>



<input
placeholder="Default Timing">

</div>

</div>



<div class="actions">

<button
class="btn btn--primary">

Save Changes

</button>



<a
href="../../index.html"
class="btn btn--ghost">

Logout

</a>

</div>

</section>

</div>

</main>

</body>

</html>

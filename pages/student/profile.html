<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Profile • BioByte
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="../../assets/css/style.css">

<link
rel="stylesheet"
href="../../assets/css/profile.css">

</head>

<body>

<main class="profile">

<div class="container">

<a
href="dashboard.html"
class="back">

← Dashboard

</a>



<section class="profile-card">

<div class="avatar">

🧬

</div>



<h1>

Student Profile

</h1>

<p>

Manage your BioByte account.

</p>



<div class="info-grid">

<div class="info">

<label>

Full Name

</label>

<input
value="Student Name">

</div>



<div class="info">

<label>

Email

</label>

<input
value="student@email.com">

</div>



<div class="info">

<label>

WhatsApp Number

</label>

<input
value="+91">

</div>



<div class="info">

<label>

Class

</label>

<select>

<option>

Class VI

</option>

<option>

Class VII

</option>

<option>

Class VIII

</option>

<option>

Class IX

</option>

<option>

Class X

</option>

<option>

Class XI

</option>

<option>

Class XII

</option>

</select>

</div>

</div>



<section class="joined">

<h2>

Joined Batches

</h2>

<div class="batch">

Alpha Biology

</div>

<div class="batch">

Genome Advanced

</div>

</section>



<div class="actions">

<button
class="btn btn--primary">

Save

</button>

<a
href="../../index.html"
class="btn btn--ghost">

Logout

</a>

</div>

</section>

</div>

</main>

</body>

</html>

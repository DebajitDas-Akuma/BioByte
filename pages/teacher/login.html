<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Login • BioByte</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/style.css">

<link rel="stylesheet" href="../../assets/css/teacher-login.css">

</head>

<body>

<main class="teacher-login">

<div class="teacher-login__container">

<a
href="../../index.html"
class="teacher-login__back">

← Back to Home

</a>



<div class="teacher-card">

<div class="teacher-card__logo">

🧬 Bio<span>Byte</span>

</div>

<h1>

Teacher Portal

</h1>

<p>

Manage batches, exams and student approvals.

</p>



<form
id="teacherLoginForm">

<label>

Teacher Email

<input
type="email"
name="email"
id="teacherEmail"
required>

</label>



<label>

Password

<div class="password">

<input
type="password"
name="password"
id="teacherPassword"
required>

<button
type="submit"
class="password-toggle">

👁

</button>

</div>

</label>



<label class="remember">

<input
type="checkbox"
id="teacherRemember"
checked>

<span>

Keep me signed in

</span>

</label>



<button
type="submit"
id="teacherLoginBtn"
class="btn btn--primary btn--full">

Login

</button>



<p class="teacher-note">

Teacher accounts are created internally.

</p>

</form>

</div>

</div>

</main>



<script>

document
.querySelector(
".password-toggle"
)
.onclick=()=>{

const input=

document.getElementById(
"teacherPassword"
);

input.type=

input.type==="password"

?

"text"

:

"password";

};

</script>
<script type="module" src="../../assets/js/teacher-login.js"></script>
</body>

</html>

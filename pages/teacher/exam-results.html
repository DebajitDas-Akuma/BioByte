<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Exam Results • BioByte
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../../assets/css/style.css">

<link rel="stylesheet"
href="../../assets/css/exam-results.css">

</head>

<body>

<main class="results">

<div class="results__container">

<a
href="dashboard.html"
class="results__back">

← Dashboard

</a>



<div class="results-card">

<h1>

Exam Results

</h1>

<p>

Create exams and publish marks.

</p>



<div class="exam-top">

<select id="batchSelect">

<option>
Select Batch
</option>

</select>



<input
type="text"
id="examName"
placeholder="Exam Name">

<button
class="btn btn--primary"
id="createExamBtn">

Create Exam

</button>

</div>



<div class="table-wrap">

<table>

<thead>

<tr>

<th>

Student

</th>

<th>

Class

</th>

<th>

Marks

</th>

</tr>

</thead>

<tbody
id="studentsTable">

<tr>

<td>

Rahul Das

</td>

<td>

XI

</td>

<td>

<input
type="number"
placeholder="0">

</td>

</tr>



<tr>

<td>

Aditi Sen

</td>

<td>

IX

</td>

<td>

<input
type="number"
placeholder="0">

</td>

</tr>

</tbody>

</table>

</div>



<div class="actions">

<button
class="btn btn--outline">

Save Draft

</button>

<button
id="saveResults"
class="btn btn--primary">

Publish Results

</button>

</div>

</div>

</div>

</main>
<script
type="module"
src="../../assets/js/teacher-exam-results.js">
</script>
</body>

</html>
